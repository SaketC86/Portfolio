<!DOCTYPE html>
<html>
<head>
  <title>Message Sent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .box {
      margin-top: 20vh;
      animation: fadeIn 1s ease-in-out;
    }

    .circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgb(231, 76, 96);
      margin: 0 auto;
      line-height: 100px;
      font-size: 50px;
      color: rgb(231, 76, 96);
      animation: pop 0.5s ease;
    }

    h1 {
      margin-top: 20px;
      animation: slideUp 0.6s ease;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 28px;
      background: rgb(231, 76, 96);
      color: white;
      text-decoration: none;
      border-radius: 2px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgb(200, 60, 80);
    }

    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="box">
    <div class="circle">✓</div>
    <h1>Message Sent Successfully!</h1>
    <a href="index.html" class="btn">Go Back</a>
  </div>

</body>
</html>
